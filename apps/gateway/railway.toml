# ════════════════════════════════════════════════════════════════════════
# Hisaflow LLM Gateway — Railway deployment config
# Deploy this as a SEPARATE Railway service in the same project.
# Set all environment variables listed below in Railway's Variables tab.
# ════════════════════════════════════════════════════════════════════════

[build]
dockerfilePath = "apps/gateway/Dockerfile"

[deploy]
startCommand = "litellm --config /app/config.yaml --port 4000 --host 0.0.0.0"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
